<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms Demo</title>
</head>

<body>
  <h1>Forms</h1>

  <form action="/tacos">
    <p>
      <label for="username">Enter a username:</label>
      <input type="text" placeholder="username" id="username" name="username">
    </p>
    <p>
      <label for="password">Enter a password:</label>
      <input type="password" placeholder="password" id="password" name="password">
    </p>
    <p>
      <label for="color">Pick a color:</label>
      <input type="color" id="color" name="color">
    </p>
    <p>
      <!-- Less common approach, still works -->
      <label>
        Enter a number between 1 and 1000:
        <input type="number" placeholder="enter a number" name="num" min="0" max="1000">
      </label>
    </p>
    <button>Submit</button>
    <!-- This type doesn't submit the form because of type -->
    <button type="button">Not Submit</button>
    <!-- Another alternative for submit button -->
    <input type="submit" value="Click me!">
  </form>
  <hr>
  <!-- Default button behavir does nothing outside of a form -->
  <button>Not inside form</button>

  <h2>Hijacking Searches</h2>

  <h3>Reddit</h3>
  <form action="https://www.reddit.com/search">
    <input type="text" name="q">
    <button>Search Reddit</button>
  </form>

  <h3>Google</h3>
  <form action="https://www.google.com/search">
    <input type="text" name="q">
    <button>Search Google</button>
  </form>

  <h3>YouTube</h3>
  <form action="https://www.youtube.com/results">
    <input type="text" name="search_query">
    <button>Search YouTube</button>
  </form>

  <h2>More Inputs</h2>

  <h3>Checkboxes</h3>
  <form action="/birds">
    <input type="checkbox" name="agree_tos" id="agree" checked>
    <label for="agree">I agree to everything</label>
    <button>Submit</button>
  </form>

  <h3>Radio Buttons</h3>
  <form action="/balls">
    <label for="s">Small:</label>
    <input type="radio" name="size" id="s" value="s">
    <label for="m">Medium:</label>
    <input type="radio" name="size" id="m" value="m">
    <label for="xs">Large:</label>
    <input type="radio" name="size" id="l" value="l">
    <button>Submit</button>
  </form>

  <h3>Selects</h3>
  <form action="/pizza">
    <label for="meal">Please select an entree:</label>
    <select name="meal" id="meal">
      <option value="">--Please choose an option--</option>
      <option value="fish">Fish</option>
      <option value="steak">Steak</option>
      <option value="veg">Vegetarian</option>
    </select>
    <button>Submit</button>
  </form>

  <h3>Range</h3>
  <form action="/nuts">
    <label for="vol">Volume:</label>
    <input type="range" name="vol" id="vol" min="0" max="10">
    <button>Submit</button>
  </form>

  <h3>Text Area</h3>
  <form action="/blog">
    <label for="blog">Blog Post:</label>
    <textarea name="blog" id="blog" rows="10" cols="40" placeholder="Enter text..."></textarea>
    <button>Submit</button>
  </form>

  <h2>Validations Demo</h2>
  <form action="/validation">
    <div>
      <label for="first">Enter first name:</label>
      <input type="text" name="first" id="first" required>
    </div>
    <div>
      <label for="username">Username:</label>
      <input type="password" name="username" id="username" minlength="5" maxlength="20" required>
    </div>
    <div>
      <!-- Patterns -->
      <input type="email" name="" id="" required>
      <input type="url">
    </div>

    <button>Submit</button>
  </form>

</body>

</html>
